services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: clyvo
      APP_USER_PASSWORD: Clyvo123
    ports:
      - "1522:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  clyvo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clyvo-api
    depends_on:
      oracle-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__OracleConnection: "User Id=SYSTEM;Password=Oracle123;Data Source=oracle-db:1521/XEPDB1;"
      ASPNETCORE_ENVIRONMENT: Production
    restart: always

volumes:
  oracle-data: